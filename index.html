<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1DC078" />
    <meta name="description" content="파일 전자서명, 암호화, 압축 PWA" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PKIZIP" />
    <link rel="apple-touch-icon" href="/pkizip/icon-192.png" />

    <!-- Android/Chrome -->
    <link rel="icon" type="image/png" sizes="192x192" href="/pkizip/icon-192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/pkizip/icon-48.png" />

    <title>PKIZIP</title>
    <script>
      // GitHub Pages SPA redirect 복원 (404.html에서 보낸 경로)
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, '', l.pathname.slice(0, -1) + decoded + l.hash);
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
