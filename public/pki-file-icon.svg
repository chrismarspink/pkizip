<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 봉투 + 자물쇠 + PKI 라벨 — PKIZIP 전용 .pki 파일 마크 -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1F6FE5"/>
      <stop offset="1" stop-color="#0C3276"/>
    </linearGradient>
  </defs>
  <!-- 봉투 외곽 -->
  <rect x="4" y="12" width="56" height="44" rx="6" fill="url(#g)"/>
  <!-- 봉투 플랩 -->
  <path d="M4 18 L32 38 L60 18" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linejoin="round" opacity="0.9"/>
  <!-- 자물쇠 (왼쪽 위) -->
  <g transform="translate(8 10)">
    <rect x="0" y="6" width="14" height="11" rx="2" fill="#FFD23F" stroke="#0C3276" stroke-width="1.5"/>
    <path d="M3 6 V3 a4 4 0 0 1 8 0 V6" fill="none" stroke="#0C3276" stroke-width="2" stroke-linecap="round"/>
    <circle cx="7" cy="11.5" r="1.5" fill="#0C3276"/>
  </g>
  <!-- PKI 라벨 (오른쪽 아래) -->
  <rect x="36" y="42" width="20" height="10" rx="2" fill="#FFFFFF" opacity="0.95"/>
  <text x="46" y="50" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="7" font-weight="700" fill="#0C3276" letter-spacing="0.5">PKI</text>
</svg>
